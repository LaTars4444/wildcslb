name: Sync Lifetime Wagers

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: Run lifetime wager sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: npm run sync:wagers
